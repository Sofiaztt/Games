<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帝梦·后宫志</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #080604;
  --gold: #c9a444;
  --gold-dim: #7a6128;
  --crimson: #8b1515;
  --crimson-dim: #4a0d0d;
  --jade: #2d6b4a;
  --text: #d4b896;
  --text-dim: #7a6848;
  --card-bg: #110d09;
  --border: rgba(201,164,68,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--text);font-family:'Noto Serif SC',serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(139,21,21,0.07) 0%,transparent 55%)}

/* ── Header ── */
header{text-align:center;padding:2.5rem 1rem 1.5rem;border-bottom:1px solid var(--border);position:relative}
h1{font-size:2rem;font-weight:300;letter-spacing:.5em;color:var(--gold);text-shadow:0 0 40px rgba(201,164,68,.25)}
.subtitle{font-size:.7rem;letter-spacing:.3em;color:var(--text-dim);margin-top:.4rem}

/* ── Nav ── */
nav{display:flex;justify-content:center;border-bottom:1px solid var(--border)}
.tab{padding:.75rem 2.2rem;cursor:pointer;font-size:.8rem;letter-spacing:.2em;color:var(--text-dim);
  border:none;border-bottom:2px solid transparent;background:none;font-family:'Noto Serif SC',serif;transition:all .25s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── Views ── */
.view{display:none;padding:1.8rem}
.view.active{display:block}

/* ── Filter ── */
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;max-width:1200px;margin:0 auto 1.4rem}
.filter-btn{font-size:.62rem;padding:.25rem .7rem;border:1px solid var(--border);background:none;
  color:var(--text-dim);cursor:pointer;letter-spacing:.1em;font-family:'Noto Serif SC',serif;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:var(--gold-dim);color:var(--gold)}

/* ── Cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:1.1rem;max-width:1200px;margin:0 auto}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:2px;padding:1.3rem;cursor:pointer;
  transition:all .25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--crimson),transparent);opacity:0;transition:opacity .3s}
.card:hover{border-color:rgba(201,164,68,.35);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.card:hover::before{opacity:1}
.card-name{font-size:1.1rem;font-weight:500;color:var(--gold);letter-spacing:.1em;margin-bottom:.15rem}
.card-sub{font-size:.68rem;color:var(--text-dim);letter-spacing:.12em;margin-bottom:.6rem}
.death-badge{display:inline-block;font-size:.58rem;padding:.12rem .45rem;letter-spacing:.1em;margin-bottom:.65rem}
.death-murdered{background:rgba(139,21,21,.25);color:#c97070;border:1px solid rgba(139,21,21,.45)}
.death-executed{background:rgba(80,40,0,.25);color:#c9a070;border:1px solid rgba(139,80,0,.45)}
.death-natural{background:rgba(20,60,90,.25);color:#70b0c9;border:1px solid rgba(20,90,130,.45)}
.death-childbirth{background:rgba(40,40,80,.25);color:#9090c9;border:1px solid rgba(40,40,120,.45)}
.death-surviving{background:rgba(20,80,45,.25);color:#70c990;border:1px solid rgba(20,120,60,.45)}
.card-bars{display:flex;gap:.8rem;margin-bottom:.7rem}
.bar-group{flex:1;text-align:center}
.bar-label{font-size:.52rem;color:var(--text-dim);letter-spacing:.08em;display:block;margin-bottom:.2rem}
.bar-track{height:2px;background:rgba(255,255,255,.05);border-radius:1px;overflow:hidden;margin-bottom:.15rem}
.bar-fill{height:100%;border-radius:1px}
.bar-fill.fv{background:var(--crimson)}
.bar-fill.af{background:var(--jade)}
.bar-val{font-size:.58rem;color:var(--text-dim)}
.fate-row{margin-bottom:.6rem}
.fate-tag{display:inline-block;font-size:.56rem;border:1px solid rgba(201,164,68,.15);
  padding:.03rem .28rem;margin:.08rem;color:var(--gold-dim)}
.card-lines{margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);
  font-size:.62rem;color:var(--text-dim);line-height:1.85;white-space:pre-line;letter-spacing:.05em}

/* ── 图片 ── */
.card-img-wrap{width:100%;aspect-ratio:2/3;overflow:hidden;margin-bottom:.9rem;position:relative;
  border:1px solid var(--border);background:#0c0906}
.card-img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;
  transition:transform .4s ease}
.card:hover .card-img{transform:scale(1.04)}
.card-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:2rem;color:var(--gold-dim);letter-spacing:.1em;font-weight:300;
  background:linear-gradient(180deg,rgba(201,164,68,.06) 0%,rgba(0,0,0,.2) 100%)}
/* 卡片图片底部渐变遮罩 */
.card-img-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(0deg,var(--card-bg) 0%,transparent 100%);pointer-events:none}

/* Modal 顶部 flex 布局 */
.modal-top{display:flex;gap:1.4rem;margin-bottom:1.3rem;padding-bottom:1.3rem;
  border-bottom:1px solid var(--border)}
.modal-img-wrap{width:120px;flex-shrink:0;aspect-ratio:2/3;overflow:hidden;
  border:1px solid var(--border);background:#0c0906;align-self:flex-start}
.modal-img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.modal-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;color:var(--gold-dim);font-weight:300}
.modal-top-info{flex:1;min-width:0}

/* ── Timeline ── */
.tl-wrap{overflow-x:auto;padding-bottom:1rem}
.tl-inner{min-width:860px;padding:.5rem 1rem}
.tl-axis{display:flex;padding-left:82px;border-bottom:1px solid var(--border);margin-bottom:1.6rem;padding-bottom:.4rem}
.yr{flex:1;text-align:center;font-size:.58rem;color:var(--text-dim);letter-spacing:.05em;position:relative}
.yr::before{content:'';position:absolute;bottom:-.4rem;left:50%;width:1px;height:5px;background:var(--border)}
.tl-rows{display:flex;flex-direction:column;gap:.4rem}
.tl-row{display:flex;align-items:center;height:26px;cursor:pointer}
.tl-row:hover .tl-bar{opacity:1}
.tl-lbl{width:82px;font-size:.66rem;color:var(--text-dim);text-align:right;padding-right:.7rem;flex-shrink:0}
.tl-track{flex:1;position:relative;height:100%}
.tl-bar{position:absolute;height:9px;top:50%;transform:translateY(-50%);border-radius:1px;opacity:.65;transition:opacity .2s}
.tl-bar.murdered{background:linear-gradient(90deg,var(--crimson-dim),var(--crimson))}
.tl-bar.executed{background:linear-gradient(90deg,#4a2800,#8b5200)}
.tl-bar.natural{background:linear-gradient(90deg,#1a3a50,#3a7a9a)}
.tl-bar.surviving{background:linear-gradient(90deg,#1a4025,#2d8b50)}
.tl-bar.childbirth{background:linear-gradient(90deg,#1a1a50,#3a3a8b)}
.tl-dot-s{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--gold-dim);top:50%;transform:translateY(-50%)}
.tl-dot-e{position:absolute;width:7px;height:7px;border-radius:50%;top:50%;transform:translateY(-50%)}
.tl-dot-e.murdered{background:var(--crimson);box-shadow:0 0 5px var(--crimson)}
.tl-dot-e.executed{background:#8b5200}
.tl-dot-e.natural{background:#3a7a9a}
.tl-dot-e.surviving{background:#2d8b50}
.tl-dot-e.childbirth{background:#5050c9}
.legend{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:1.4rem;max-width:860px;margin-left:auto;margin-right:auto}
.leg-item{display:flex;align-items:center;gap:.35rem;font-size:.62rem;color:var(--text-dim)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Sort group ── */
.sort-group{display:flex;gap:.5rem;align-items:center;margin-left:auto;
  padding-left:.85rem;border-left:1px solid var(--border)}

/* ── Network ── */
#net-canvas{display:block;width:100%;max-width:900px;margin:0 auto;cursor:default}
.net-legend{display:flex;gap:1.2rem;justify-content:center;margin-top:.8rem;flex-wrap:wrap}
.net-leg-item{display:flex;align-items:center;gap:.35rem;font-size:.62rem;color:var(--text-dim)}
.net-leg-line{width:22px;height:2px}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;overflow-y:auto;padding:2rem}
.modal-overlay.active{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--card-bg);border:1px solid var(--border);max-width:660px;width:100%;
  padding:2.2rem;position:relative;border-radius:2px;margin:auto}
.modal::before{content:'';position:absolute;top:0;left:2rem;right:2rem;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.modal-x{position:absolute;top:.9rem;right:1.1rem;background:none;border:none;
  color:var(--text-dim);font-size:1.1rem;cursor:pointer;font-family:'Noto Serif SC',serif;transition:color .2s}
.modal-x:hover{color:var(--gold)}
.modal-name{font-size:1.5rem;font-weight:300;color:var(--gold);letter-spacing:.3em;margin-bottom:.25rem}
.modal-meta{font-size:.72rem;color:var(--text-dim);letter-spacing:.15em;margin-bottom:1.3rem}
.modal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1.3rem;
  padding-bottom:1.3rem;border-bottom:1px solid var(--border)}
.m-stat{text-align:center;padding:.5rem;background:rgba(255,255,255,.02);border:1px solid var(--border)}
.m-stat-l{font-size:.5rem;color:var(--text-dim);letter-spacing:.15em;display:block;margin-bottom:.25rem}
.m-stat-v{font-size:.88rem;color:var(--text)}
.modal-bio{font-size:.82rem;line-height:2.05;color:var(--text);white-space:pre-wrap;margin-bottom:1.3rem}
.modal-jd{padding:.9rem;border-left:2px solid var(--gold-dim);background:rgba(201,164,68,.04);
  font-size:.76rem;line-height:2.2;color:var(--text-dim);white-space:pre-line;letter-spacing:.05em}
    /* 传记内联人名跳转 */
.bio-link{
  color: #e8c870;
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: rgba(232,200,112,0.4);
  text-underline-offset: 3px;
  transition: text-decoration-color .2s;
}
.bio-link:hover{
  text-decoration-color: #e8c870;
}
#bio-tooltip{
  position:fixed;z-index:200;display:none;pointer-events:none;
  background:#110d09;border:1px solid rgba(201,164,68,.3);
  padding:.7rem;max-width:200px;
  box-shadow:0 8px 24px rgba(0,0,0,.65);
  font-family:'Noto Serif SC',serif;
}
#bio-tooltip::before{content:'';position:absolute;top:0;left:1rem;right:1rem;
  height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
</style>
</head>
<body>

<header>
  <h1>帝　梦　·　后　宫　志</h1>
  <p class="subtitle">逸康年间　后妃档案</p>
</header>

<nav>
  <button class="tab active" onclick="switchView('cards',this)">人 物 览</button>
  <button class="tab" onclick="switchView('timeline',this)">时 间 轴</button>
  <button class="tab" onclick="switchView('network',this)">关 系 图</button>
</nav>

<div id="view-cards" class="view active">
  <div class="filter-bar" id="filter-bar"></div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<div id="view-timeline" class="view">
  <div class="legend" id="tl-legend"></div>
  <div class="tl-wrap"><div class="tl-inner" id="tl-inner"></div></div>
</div>

<div id="view-network" class="view">
  <canvas id="net-canvas" height="540"></canvas>
  <div class="net-legend">
    <div class="net-leg-item"><div class="net-leg-line" style="background:#8b1515"></div>致死</div>
    <div class="net-leg-item"><div class="net-leg-line" style="background:rgba(139,80,0,.8)"></div>加害</div>
    <div class="net-leg-item"><div class="net-leg-line" style="background:#2d6b4a"></div>交好</div>
    <div class="net-leg-item"><div class="net-leg-line" style="background:rgba(96, 189, 226, 0.4)"></div>族亲</div>
  </div>
</div>

  <div class="modal-overlay" id="modal" onclick="modalBgClick(event)">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div class="modal-top">
      <div class="modal-img-wrap" id="m-img-wrap">
        <div class="modal-ph" id="m-ph">？</div>
      </div>
      <div class="modal-top-info">
        <div class="modal-name" id="m-name"></div>
        <div class="modal-meta" id="m-meta"></div>
        <div class="modal-grid" id="m-grid"></div>
      </div>
    </div>
    <div class="modal-bio" id="m-bio"></div>
    <div class="modal-jd" id="m-jd"></div>
  </div>
</div>

<script>
/* ================================================================
   ██████╗  █████╗ ████████╗ █████╗
   ██╔══██╗██╔══██╗╚══██╔══╝██╔══██╗
   ██║  ██║███████║   ██║   ███████║
   ██║  ██║██╔══██║   ██║   ██╔══██║
   ██████╔╝██║  ██║   ██║   ██║  ██║
   ╚═════╝ ╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝

  【填写说明】
  只需修改下方两个数组：

  1. others[]  — 非妃嫔节点（凶手、帝等），一般不用动
  2. concubines[] — 每位妃子一条记录，字段含义见模板注释

  【字段说明】
  id          唯一标识，建议拼音，如 "yan_qing_yuan"
  name        姓名
  title       封号，无则 ""
  rank        最终位分
  age         死亡时年龄
  origin      出身
  specialty   擅长，无则 ""
  entryYear   逸康X年入宫（纯数字）
  deathYear   逸康X年去世（纯数字）
  favor       宠爱值
  affection   好感值（她对帝的感情）
  fate        命格数组，如 ["强健","仁爱"]，无则 []
  deathType   "murdered"被害 / "executed"赐死 / "natural"病逝 / "childbirth"难产 / "surviving"存世（结档仍在世）
  killer      直接凶手姓名，无则 ""
  sons        皇子总数
  survivingSons    现存皇子数
  daughters        公主总数
  survivingDaughters 现存公主数
  enemies     厌恶的人，姓名数组
  friends     交好的人，姓名数组
  clan        同族妃嫔的 id 列表
  harmedBy    她受到的伤害，[{ by:"姓名", type:"小产/染病/落水致死", year:X }]
  harmed      她造成的伤害，[{ to:"姓名", type:"...", year:X }]
  bio         小传全文，可先留 ""
  judgment    判词，换行用 \n
================================================================ */

// ── 非妃嫔节点 ──────────────────────────────────────────────
const others = [
  { id:"emperor",    name:"帝",     type:"emperor"  },
 // { id:"yunxuanluo", name:"云玄珞", type:"villain"  },
];

// ── 妃嫔数据 ────────────────────────────────────────────────
const concubines = [

  // ══════════════════════════════════════
  // 燕清媛（完整示例，照此格式填写其余条目）
  // ══════════════════════════════════════
  {
    id:"yan_qing_yuan", name:"燕清媛", title:"", rank:"嫔",
    age:17, origin:"京畿小吏", specialty:"诗词",
    entryYear:5, deathYear:7,
    favor:448, affection:340,
    fate:["强健","仁爱","利欲"],
    deathType:"murdered", killer:"夏宁昭",
    sons:0, survivingSons:0, daughters:0, survivingDaughters:0,
    enemies:["夏宁昭"], friends:[], clan:[],
    harmedBy:[
      {by:"夏宁昭",type:"小产",year:6},
      {by:"帝",    type:"赐药小产",year:7},
      {by:"夏宁昭",type:"小产致死",year:7},
    ],
    harmed:[],
    image:"images/燕清媛.png",        // 填入图片路径后此处会显示人物图，如 "images/燕清媛.jpg"
    bio:
`人物简介
燕氏，出身京畿小吏之家，家族势力不显，然胜在天子脚下，并非全无见识。她性情温和，意志却畏缩，才智平平，容貌中人，唯擅诗词一项，算得上闺中薄才。道德亦无甚出奇，不过凡夫俗子之格局，心中藏着一点"荣华富贵"的野心，不大，却真实——这或许是她被带入宫后，咬牙撑住的隐秘动力。
命格中"强健"二字，与她最终血崩离世的结局形成了深深的讽刺；"仁爱"则印证了她无争无怨的性情，在宫廷漩涡中从未主动出手害人，慈戒、记过皆为零；"利欲"与她对荣华的渴盼暗暗呼应——入了宫，总盼着能站稳。
宫中两载，与[[夏宁昭]]结为死仇，非因一时口角，而是以血与子嗣为代价。

编年经历
逸康五年三月初三，帝春日野游，燕氏偶入御驾视野，当日被带回后宫，封为答应，时年十五。她并非旁人引荐，亦非家族送入，只是一次春游的偶然。帝对她的最初垂顾，或许不过是那一日的心动，轻巧，却改变了她此后所有的命运走向。
入宫后，宠幸颇为频繁。两年间，帝宠幸燕氏共十六次，年均八次，入宫年限虽短，宠爱值随之积累至四百余，置于两年这个时间框架内，实属持续受宠的节奏。帝对她确有真实的热度，三次有孕、六度晋封，皆可印证。
入宫九月后，逸康五年十二月十六日，燕氏第一次有孕，因此晋封为常在。
逸康六年六月初九，晋位美人，然同日意外小产——查明系宫人夏宁昭所为。腹中孩儿已有五六月，就这样没了。晋封与失子同日发生，喜与悲叠在一处，不知该以何种面目站在新的位分里。这一年，她十六岁。
小产后五个月，逸康六年十一月初九，燕氏再次有孕，十一月十一日晋为贵人，十二月十一日再晋为小仪，一月之内连升两级。位分攀升之快，背后是帝王彼时仍在频繁宠幸她——而非情感的格外深厚。两次有孕、连续晋封，或许让她以为局面已在好转，以为肚中的孩子这回能留住。逸康七年正月初三，帝赐药令其小产。彼时腹中胎儿已诊出为女，宫中公主已多，帝未留。不足三月的身孕，以这样的理由散去。此时距上一次小产，不过半年。
逸康七年五月初八，燕氏第三次有孕，翌日晋封为嫔。两年，从答应到嫔，六级位分，皆以怀孕为阶。这是她此生所能抵达的最高位分，也是她最后一次晋封。
逸康七年八月初六，意外小产，系[[夏宁昭]]再度加害。两日后，八月初八，血崩，不治。

推测
三度有孕，三度皆失，来路却各不相同：[[夏宁昭]]的手伸入其中两次，帝王自己动了一次。燕氏厌恶夏宁昭，这份恨是带血的，清晰的。至于帝赐药那一回，她大约说不清自己是什么感受——帝对她并非无情，宠幸从未断绝，晋封也从未吝啬，只是那个女胎，在权衡之下不值得留。她或许连恨都不知从何处落脚，只能咽下去。

此后又是两年多的等待。逸康八年五月初六，真正有孕，两日后晋封为贵人。逸康九年二月初三，诞下公主周依十映，当日晋为小仪。

逸康十五年正月初九，夏宁昭染她疾病——彼时[[夏宁昭]]刚自佛寺回宫不满一年，出手之早，可见其不曾真正收敛。病中两个月后，逸康十五年三月初九，沈怡巧再次有孕，翌日晋封为容华。那年四月，登上季宠妃之位。逸康十五年十一月初七，诞下皇子周允十八金，翌日晋为婕妤。这是她在宫中的第一个儿子，她等了十五年。

推测
十八年，一百一十五次宠幸，五次有孕——帝说她难怀孕，的确如此，但她每一次抓住了，就没有松手。百折不挠的意志，在她的宫廷岁月里体现得最为真实：假孕受过之后重新开始，丧女之痛中继续，染病之中继续，一个孩子被赐药取走之后继续。她的移天换日之野心，不是阴谋，而是一种燃烧着的、向着帝王之心不断靠近的执念。

周允二十八开出生时，母亲已经不在了。

结语
逸康十九年六月初一，沈怡巧，年三十七，以妃位难产去世。在宫十八年，育有皇子周允十八金、周允二十八开，公主周依十四冰，现存三人。公主周依十映早夭，一孕赐药失子，五孕留三，一生以百折不挠之志，熬至盛宠最深处。`,

难产之后，顾媛鸾的身体便不再是从前的身体了。宠幸仍在延续，情分仍在积累，但不能再孕，是这个时代宫廷里对一个妃嫔最关键的失去。帝之后说"圣宠渐衰"，或许正是从那一次生产之后，便开始了。

推测
她进宫时拥有这个宫廷里几乎最好的一切——太后背书、名门出身、倾国容貌、最高位分。她输掉的，是那一次生产，是她的身体，是帝王渐移的目光，最终是那六年无人问津的病榻。

function rankWeight(rank){ const i=RANK_ORDER.indexOf(rank); return i===-1?-1:RANK_ORDER.length-i; }

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function pct(v,max){return clamp((v/max)*100,0,100)}

const SORT_DEFS=[["entryYear","入宫年限"],["rank","位份"],["deathYear","死亡年限"]];

function sortBtnLabel(key,label){
  if(currentSort.key!==key)return label;
  return label+(currentSort.dir===-1?" ↓":" ↑");
}

function renderFilterBar(){
  const btns=[["all","全部"],["murdered","被害"],["executed","赐死"],["natural","病逝"],["childbirth","难产"],["surviving","存世"]];

function setFilter(v,btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter = v==="all"?null:v;
  // 恢复当前排序按钮的 active 状态
  if(currentSort.key) document.getElementById("sort-btn-"+currentSort.key)?.classList.add("active");
  renderCards();
}

function setSort(key){
  if(currentSort.key===key){
    currentSort.dir*=-1;
  } else {
    currentSort.key=key;
    currentSort.dir=-1; // 首次点击：晚→早 / 高→低
  }
  // 更新按钮标签和 active 状态
  SORT_DEFS.forEach(([k,l])=>{
    const b=document.getElementById("sort-btn-"+k);
    if(!b)return;
    b.classList.toggle("active",k===currentSort.key);
    b.textContent=sortBtnLabel(k,l);
  });
  renderCards();
}

// ── 时间轴 ────────────────────────────────────────────────────
let tlDone=false;
function renderTimeline(){
  if(tlDone)return; tlDone=true;
  const inner=document.getElementById("tl-inner");

    const surviving=c.deathType==="surviving";

// ── 关系图（Canvas） ──────────────────────────────────────────
let netDone=false;
function renderNetwork(){
  if(netDone)return; netDone=true;
  const canvas=document.getElementById("net-canvas");
  const W=canvas.offsetWidth; canvas.width=W;
  const H=540; const ctx=canvas.getContext("2d");

  // 构建节点
  const nodeList=[
    ...concubines.map(c=>({id:c.name,type:"concubine",dt:c.deathType})),
    ...others.map(o=>({id:o.name,type:o.type})),
  ];
  const seen=new Set();
  const nodes=nodeList.filter(n=>{if(seen.has(n.id))return false;seen.add(n.id);return true;});

  // 构建边
  const edges=[];
  concubines.forEach(c=>{
    c.harmedBy.forEach(h=>{
      const fatal=h.type.includes("致死");
      edges.push({from:h.by,to:c.name,type:fatal?"kill":"harm"});
    });
    c.harmed.forEach(h=>{
      const fatal=h.type.includes("致死");
      edges.push({from:c.name,to:h.to,type:fatal?"kill":"harm"});
    });
    c.friends.forEach(f=>edges.push({from:c.name,to:f,type:"friend"}));
    c.clan.forEach(cl=>{
      const target=concubines.find(x=>x.id===cl);
      if(target) edges.push({from:c.name,to:target.name,type:"clan"});
    });
  });

  // 初始圆形布局
  const cx=W/2, cy=H/2, R=Math.min(W,H)*.38;
  nodes.forEach((n,i)=>{
    const a=(i/nodes.length)*Math.PI*2-Math.PI/2;
    n.x=cx+R*Math.cos(a); n.y=cy+R*Math.sin(a);
    n.vx=0; n.vy=0;
  });
  const nmap={}; nodes.forEach(n=>nmap[n.id]=n);

  // 力导向
  function tick(){
    for(let i=0;i<nodes.length;i++)
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(Math.sqrt(dx*dx+dy*dy),.1);
        const f=1800/(d*d);
        a.vx-=f*dx/d; a.vy-=f*dy/d;
        b.vx+=f*dx/d; b.vy+=f*dy/d;
      }
    edges.forEach(e=>{
      const a=nmap[e.from],b=nmap[e.to]; if(!a||!b)return;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(Math.sqrt(dx*dx+dy*dy),.1);
      const f=d*.009;
      a.vx+=f*dx/d; a.vy+=f*dy/d;
      b.vx-=f*dx/d; b.vy-=f*dy/d;
    });
    nodes.forEach(n=>{
      n.vx+=(cx-n.x)*.002; n.vy+=(cy-n.y)*.002;
      n.vx*=.82; n.vy*=.82;
      n.x=clamp(n.x+n.vx,40,W-40);
      n.y=clamp(n.y+n.vy,20,H-20);
    });
  }

  const EC={kill:"rgba(139,21,21,.85)",harm:"rgba(139,80,0,.6)",friend:"rgba(45,107,74,.8)",clan:"rgba(96, 189, 226, 0.8)"};
  const NC={murdered:"#8b1515",executed:"#8b5200",natural:"#3a7a9a",childbirth:"#5050c9",surviving:"#2d8b50"};

  function draw(){
    ctx.clearRect(0,0,W,H);
    // 边
    edges.forEach(e=>{
      const a=nmap[e.from],b=nmap[e.to]; if(!a||!b)return;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=EC[e.type]||"#555";
      ctx.lineWidth=e.type==="kill"?1.5:.8;
      ctx.stroke();
    });
    // 节点
    nodes.forEach(n=>{
      let fill="#555";
      if(n.type==="concubine"){const c=concubines.find(c=>c.name===n.id);fill=c?NC[c.deathType]||"#4a3a2a":"#4a3a2a";}
      else if(n.type==="villain")fill="#4a0000";
      else if(n.type==="emperor")fill="#6b5200";
      const r=n.type==="emperor"?10:n.type==="villain"?8:6;
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle=fill; ctx.fill();
      ctx.strokeStyle="rgba(201,164,68,.25)"; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle=n.type==="villain"?"#c97070":n.type==="emperor"?"#c9a444":"rgba(212,184,150,.85)";
      ctx.font=`${n.type==="emperor"?"11":"10"}px 'Noto Serif SC',serif`;
      ctx.textAlign="center"; ctx.fillText(n.id,n.x,n.y-r-4);
    });
  }

  let fr=0;
  function loop(){for(let i=0;i<3;i++)tick();draw();fr++;if(fr<220)requestAnimationFrame(loop);}
  loop();

  // ── 节点交互：悬停预览卡片 & 点击打开详情 ──
  function nodeAt(clientX,clientY){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const mx=(clientX-rect.left)*scaleX, my=(clientY-rect.top)*scaleY;
    for(const n of nodes){
      if(n.type!=="concubine")continue;
      if((mx-n.x)**2+(my-n.y)**2<=(6+5)**2)return n;
    }
    return null;
  }
  canvas.addEventListener("mousemove",e=>{
    const n=nodeAt(e.clientX,e.clientY);
    if(n){
      canvas.style.cursor="pointer";
      const c=concubines.find(c=>c.name===n.id);
      if(c)showTooltip(e,c.id);
    }else{
      canvas.style.cursor="default";
      hideTooltip();
    }
  });
  canvas.addEventListener("mouseleave",()=>{
    canvas.style.cursor="default";
    hideTooltip();
  });
  canvas.addEventListener("click",e=>{
    const n=nodeAt(e.clientX,e.clientY);
    if(n){
      const c=concubines.find(c=>c.name===n.id);
      if(c)openModal(c.id);
    }
  });
}

// ── Modal ─────────────────────────────────────────────────────
function showTooltip(e, id){
  const c = concubines.find(c=>c.id===id); if(!c) return;
  const tip = document.getElementById('bio-tooltip');
  const imgHtml = c.image
    ? `<img src="${c.image}" style="width:44px;aspect-ratio:2/3;object-fit:cover;object-position:top;border:1px solid rgba(201,164,68,.2);flex-shrink:0" onerror="this.outerHTML='<div style=width:44px;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:#0c0906;border:1px solid rgba(201,164,68,.2);color:#7a6128;font-size:1rem>${c.name[0]}</div>'">`
    : `<div style="width:44px;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:#0c0906;border:1px solid rgba(201,164,68,.2);color:#7a6128;font-size:1rem;flex-shrink:0">${c.name[0]}</div>`;
  tip.innerHTML = `
    <div style="display:flex;gap:.6rem;align-items:flex-start">
      ${imgHtml}
      <div style="min-width:0">
        <div style="color:#c9a444;font-size:.82rem;letter-spacing:.1em;margin-bottom:.2rem">${c.name}${c.title?`·${c.title}`:''}</div>
        <div style="color:#7a6848;font-size:.6rem;line-height:1.8">${c.rank}位${c.deathType==="surviving"?"　存世":`　享年${c.age}岁`}</div>
        <div style="color:#7a6848;font-size:.6rem">${DEATH_LABEL[c.deathType]}${c.killer?'　'+c.killer:''}</div>
        ${c.judgment?`<div style="color:#7a6848;font-size:.58rem;margin-top:.35rem;padding-top:.35rem;border-top:1px solid rgba(201,164,68,.12);line-height:1.85;white-space:pre-line">${c.judgment.split('\n').slice(0,2).join('\n')}</div>`:''}
      </div>
    </div>`;
  tip.style.display = 'block';
  const r = tip.getBoundingClientRect();
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  tip.style.left = (x + r.width > window.innerWidth ? x - r.width - 28 : x) + 'px';
  tip.style.top  = (y + r.height > window.innerHeight ? y - r.height : y) + 'px';
}
function hideTooltip(){
  document.getElementById('bio-tooltip').style.display='none';
}
function renderBio(text){
  if(!text) return "（小传待录）";
  return text.replace(/\[\[([^\]]+)\]\]/g, (_,name)=>{
    const target = concubines.find(c=>c.name===name);
    if(target) return `<span class="bio-link" onclick="openModal('${target.id}')" onmouseenter="showTooltip(event,'${target.id}')" onmouseleave="hideTooltip()">${name}</span>`;
    return name;
  });
}
function openModal(id){
  const c=concubines.find(c=>c.id===id); if(!c)return;
  // 图片
  const imgWrap=document.getElementById("m-img-wrap");
  if(c.image){
    imgWrap.innerHTML=`<img class="modal-img" src="${c.image}" alt="${c.name}" onerror="this.outerHTML='<div class=modal-ph>${c.name[0]}</div>'">`;
  } else {
    imgWrap.innerHTML=`<div class="modal-ph">${c.name[0]}</div>`;
  }
  document.getElementById("m-name").innerHTML=
    c.name+(c.title?`<span style="font-size:.65em;margin-left:.3em;color:var(--gold-dim)">·${c.title}</span>`:"");
  document.getElementById("m-meta").textContent= c.deathType==="surviving"
    ? `逸康${c.entryYear}年入宫　${c.rank}位　存世`
    : `逸康${c.entryYear}年入宫　逸康${c.deathYear}年殁　享年${c.age}岁　${c.rank}位　${DEATH_LABEL[c.deathType]}${c.killer?"（"+c.killer+"）":""}`;
  document.getElementById("m-grid").innerHTML=[
    ["宠爱",c.favor],["好感",c.affection],
    ["命格",c.fate.length?c.fate.join("·"):"无"],
    ["子嗣",`${c.sons}子${c.survivingSons}存 ${c.daughters}女${c.survivingDaughters}存`],
    ["出身",c.origin],["擅长",c.specialty||"—"],
  ].map(([l,v])=>`<div class="m-stat"><span class="m-stat-l">${l}</span><div class="m-stat-v">${v}</div></div>`).join("");
  document.getElementById("m-bio").innerHTML=renderBio(c.bio);
  document.getElementById("m-jd").textContent=c.judgment||"（判词待录）";
  document.getElementById("modal").classList.add("active");
  document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("modal").classList.remove("active");document.body.style.overflow="";}
function modalBgClick(e){if(e.target===document.getElementById("modal"))closeModal();}

// ── 视图切换 ─────────────────────────────────────────────────
function switchView(name,btn){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("view-"+name).classList.add("active");
  btn.classList.add("active");
  if(name==="timeline")renderTimeline();
  if(name==="network")renderNetwork();
}

// ── 初始化 ────────────────────────────────────────────────────
renderFilterBar();
renderCards();
</script>
<div id="bio-tooltip"></div>
</body>
</html>
